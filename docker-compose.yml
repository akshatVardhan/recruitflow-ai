services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recruitflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d recruitflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - QDRANT_URL
      - QDRANT_API_KEY
      - MINIO_ENDPOINT
      - MINIO_ACCESS_KEY
      - MINIO_SECRET_KEY
      - MINIO_SECURE
      - GCS_BUCKET_NAME
      - GCS_CREDENTIALS_JSON
      - LITELLM_API_KEY
      - DEEPSEEK_API_KEY
      - PROXYCURL_API_KEY
      - JWT_SECRET_KEY
      - JWT_ALGORITHM
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS
      - SENTRY_DSN_BACKEND
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL
      - NEXT_PUBLIC_SENTRY_DSN
    restart: unless-stopped

  celery_worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    environment:
      - DATABASE_URL
      - REDIS_URL
      - QDRANT_URL
      - QDRANT_API_KEY
      - MINIO_ENDPOINT
      - MINIO_ACCESS_KEY
      - MINIO_SECRET_KEY
      - MINIO_SECURE
      - GCS_BUCKET_NAME
      - GCS_CREDENTIALS_JSON
      - LITELLM_API_KEY
      - DEEPSEEK_API_KEY
      - PROXYCURL_API_KEY
      - JWT_SECRET_KEY
      - JWT_ALGORITHM
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS
      - SENTRY_DSN_BACKEND
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
