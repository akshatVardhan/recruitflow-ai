name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        # ubuntu-latest ships ~30GB of preinstalled toolchains this project
        # never uses (Android SDK, .NET, Haskell, a CodeQL cache). Without
        # this, the backend image build + Trivy's scan together exceeded
        # the runner's free disk space and failed with "no space left on
        # device" before the image was ever pushed or deployed.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/424745949201/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: recruitflow-agents@recruitflow-ai-500719.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build -t asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }} ./backend

      - name: Trivy image scan (blocking on HIGH/CRITICAL)
        # Pinned to v0.35.0's commit SHA, not a mutable tag: the trivy-action
        # supply-chain attack (GHSA-69fq-xp46-6x23) hijacked 76 of 77 version
        # tags, including the old 0.28.0 this was pinned to, which is why it
        # stopped resolving. v0.35.0 predates the attack and is protected by
        # GitHub's immutable-releases feature; SHA-pinning per the advisory's
        # own recommendation.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push Docker image
        run: |
          docker push asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }}

      - name: Fetch prod secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_PRD }}
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          # env-vars-file (YAML) sidesteps gcloud's --set-env-vars comma-splitting,
          # which breaks on values like the JSON GCS credentials.
          doppler secrets download --project recruitflow-ai --config prd --format json --no-file \
            | python3 -c "import json, sys; data = json.load(sys.stdin); open('/tmp/prod-env-vars.yaml', 'w').writelines(f'{k}: {json.dumps(str(v))}\n' for k, v in data.items() if not k.startswith('DOPPLER_'))"

      - name: Run migrations
        # RF-73: single persistent job (recruitflow-migrate), not one named
        # per-SHA. A bare-SHA job name collided ("already exists") whenever
        # the same commit's deploy was re-triggered - concurrent worktree
        # sessions or a manual retry both land on the same SHA. Updating a
        # fixed job name and re-executing it means retries/concurrent runs
        # just race harmlessly to the same job instead of colliding.
        # --service-account: on first-ever creation the job has no existing
        # revision to inherit a runtime identity from (unlike the deploy
        # step below), so it defaults to the project's default compute
        # SA - which recruitflow-agents has no actAs permission on.
        # Pointing it at recruitflow-agents explicitly reuses the
        # self-actAs grant already set up for the deploy step instead of
        # granting broader access on the default compute SA.
        #
        # Runs BEFORE both service deploys below (RF-73): if the migration
        # fails, this step's non-zero exit fails the job and GitHub Actions'
        # default fail-fast behavior skips every remaining step, so neither
        # service ever deploys the new revision - no separate abort logic
        # needed. --wait (not --execute-now) is required for that to work:
        # --execute-now alone returns success as soon as the execution
        # *starts*, regardless of whether the container inside it later
        # exits non-zero. --wait blocks until the execution finishes and
        # implies --execute-now, so gcloud's own exit code reflects the
        # migration container's real result.
        run: |
          if gcloud run jobs describe recruitflow-migrate --region=asia-south1 --project=recruitflow-ai-500719 >/dev/null 2>&1; then
            ACTION=update
          else
            ACTION=create
          fi
          gcloud run jobs $ACTION recruitflow-migrate \
            --image=asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }} \
            --region=asia-south1 \
            --service-account=recruitflow-agents@recruitflow-ai-500719.iam.gserviceaccount.com \
            --set-cloudsql-instances=recruitflow-ai-500719:asia-south1:recruitflow-db \
            --env-vars-file=/tmp/prod-env-vars.yaml \
            --command="alembic" \
            --args="upgrade,head" \
            --wait \
            --project=recruitflow-ai-500719

      - name: Deploy to Cloud Run
        # --memory=2Gi: the default 1GiB limit OOM'd during container
        # startup (1027 MiB used, confirmed via `gcloud logging read` on
        # the failed revision) before the app could even bind to its
        # port - torch/transformers/sentence-transformers have a large
        # baseline footprint. Revisit once RF-61 (pre-bake the embedding
        # model into the image) lands, which may lower the real number.
        run: |
          gcloud run deploy recruitflow-backend \
            --image=asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }} \
            --region=asia-south1 \
            --project=recruitflow-ai-500719 \
            --set-cloudsql-instances=recruitflow-ai-500719:asia-south1:recruitflow-db \
            --env-vars-file=/tmp/prod-env-vars.yaml \
            --memory=2Gi

      - name: Deploy Celery worker to Cloud Run
        # Same image as the API, different entrypoint (worker-entrypoint.sh
        # runs `celery worker` alongside a stdlib http.server just so Cloud
        # Run has a $PORT to health-check - see that script for detail).
        # --service-account explicit for the same reason as the migration
        # job above: this is a brand-new service with no prior revision to
        # inherit a runtime identity from, so it'd otherwise default to the
        # project's default compute SA, which recruitflow-agents has no
        # actAs permission on. --no-allow-unauthenticated: this service has
        # no legitimate external HTTP callers, only Cloud Run's own health
        # checks and the Redis broker connection it makes outbound.
        run: |
          gcloud run deploy recruitflow-worker \
            --image=asia-south1-docker.pkg.dev/recruitflow-ai-500719/recruitflow/backend:${{ github.sha }} \
            --region=asia-south1 \
            --project=recruitflow-ai-500719 \
            --service-account=recruitflow-agents@recruitflow-ai-500719.iam.gserviceaccount.com \
            --set-cloudsql-instances=recruitflow-ai-500719:asia-south1:recruitflow-db \
            --env-vars-file=/tmp/prod-env-vars.yaml \
            --memory=2Gi \
            --command=/app/worker-entrypoint.sh \
            --port=8080 \
            --no-allow-unauthenticated
