name: Frontend CI

on:
  push:
    branches:
      - feature/*
      - bugfix/*
    paths:
      - "frontend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: Prettier check
        run: npx prettier --check .

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Vitest run
        run: npx vitest run

      - name: Next.js build
        run: npm run build
