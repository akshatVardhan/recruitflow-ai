name: Backend CI

on:
  push:
    branches:
      - feature/*
      - bugfix/*
    paths:
      - "backend/**"
  pull_request:
    branches:
      - staging
      - main
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: MyPy check
        run: mypy app/

      - name: pip-audit
        run: pip-audit

      - name: Run tests
        run: pytest tests/ -v
