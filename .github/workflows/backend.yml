name: Backend CI

on:
  push:
    branches:
      - staging
      - main
      - feature/*
      - bugfix/*
    paths:
      - "backend/**"
  pull_request:
    branches:
      - staging
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: recruitflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Ruff check
        run: ruff check backend/

      - name: Black check
        run: black --check backend/

      - name: MyPy check
        run: mypy backend/app/ --ignore-missing-imports

      - name: pip-audit
        # PYSEC-2026-597: zip-slip in nltk's downloader, pulled in transitively by
        # llama-index-core (nltk>=3.9.3); no fixed nltk release exists yet and this
        # codebase never calls nltk's corpus downloader, so it isn't reachable.
        # Re-check on the next llama-index-core/nltk bump.
        run: pip-audit --ignore-vuln PYSEC-2026-597

      - name: Run tests
        run: cd backend && pytest tests/ -v
